<style>
    /* --- 1. 變數與基礎設定 --- */
    :root { 
        --brand-red: #722F37; 
        --brand-gold: #c5a059;
        --bg-light: #f5f3ef;
        --text-dark: #333;
        --card-bg: #F5F5DC;
    }

    body, html { 
        font-family: "Microsoft JhengHei", sans-serif; 
        background-color: var(--bg-light); 
        margin: 0; 
        width: 100%;
        overflow-x: hidden;
    }

    body.is-loading { overflow: hidden !important; }
    .object-fit-cover { object-fit: cover; }
    .mb-5 { margin-bottom: 3.5rem !important; }
    
    .main-wrapper {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 15px;
        box-sizing: border-box; 
    }

    /* --- 2. Navbar --- */
    .navbar { 
        background-color: var(--brand-red) !important; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
    }
    .navbar-brand { 
        font-weight: 900; 
        color: white !important; 
        font-size: 1.5rem; 
        letter-spacing: 1px; 
    }
    .nav-link { 
        color: rgba(255,255,255,0.9) !important; 
        font-weight: 500; 
    }

    /* --- 3. Loading Screen & Animation --- */
    #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
        background: #ffffff; z-index: 9999; display: flex;
        flex-direction: column; justify-content: flex-start; align-items: center;        
        padding-top: 30vh; transition: opacity 0.8s ease-out;
    }
    .logo-box { width: 220px; display: flex; flex-direction: column; align-items: center; }
    #loading-screen .logo-box svg {
        width: 220px !important; height: auto !important;
        transform-origin: 30% 40%; 
        animation: masterEntrance 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    #tent-part {
        opacity: 0; transform: scale(0);
        animation: tentBounce 0.6s 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .brand-name-loading { 
        font-size: 24px; font-weight: 900; color: #000; margin-top: 15px;
        letter-spacing: 4px; opacity: 0; animation: fadeIn 1s 1.5s forwards; 
        text-align: center; width: 100%;
    }

    /* --- 4. Hero Carousel --- */
    #heroCarousel { height: 65vh; min-height: 400px; background-color: #000; position: relative; overflow: hidden; }
    .carousel-inner, .carousel-item { height: 100%; }
    .hero-bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; }
    .hero-bg-layer::after {
        content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 65%; 
        background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%); z-index: 2;
    }
    .carousel-caption-custom { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; width: 85%; }
    .carousel-caption-custom h1, .hero-subtitle {
        font-size: 2.8rem !important; font-weight: 800 !important; color: #ffffff !important; 
        text-shadow: 2px 2px 15px rgba(0,0,0,0.8); letter-spacing: 2px; margin-bottom: 8px;
    }
    .hero-desc { display: inline-block; font-size: 1.1rem !important; color: #ffffff !important; background: rgba(0,0,0,0.55); padding: 6px 16px; border-radius: 6px; backdrop-filter: blur(4px); }

    /* --- 5. Cards (八毅光暈整合版) --- */
    .section-title { color: var(--brand-red); font-weight: 900; margin: 60px 0 40px; text-align: center; letter-spacing: 2px; }
    .section-title::after { content: ''; display: block; width: 50px; height: 3px; background: var(--brand-red); margin: 15px auto; }

    .glow-card-final, .service-card, .album-card {
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
        position: relative; z-index: 1; border-radius: 12px; overflow: hidden;
        border: 1px solid #eee !important; background: #fff !important;
        text-decoration: none; color: inherit; display: block; cursor: pointer;
    }

    .col:hover .glow-card-final, .service-card:hover, .album-card:hover {
        transform: translateY(-15px) !important; z-index: 10 !important;
        box-shadow: 0 20px 40px rgba(114, 47, 55, 0.35) !important;
        border-color: var(--brand-red) !important;
    }

    .glow-card-final img, .service-card img { width: 100%; transition: transform 0.5s ease; object-fit: cover; }
    .service-card img { height: 220px; }
    .col:hover img { transform: scale(1.08); }
    .service-card-body { padding: 25px; text-align: center; }
    .card { background-color: var(--card-bg) !important; border: none !important; }
    #monitor-card { transform: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important; }

    /* --- 6. Gallery & Lightbox --- */
    .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; width: 100%; }
    .album-img-wrapper { position: relative; width: 100%; aspect-ratio: 3 / 2; overflow: hidden; }
    .album-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }

    #imgLightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; align-items: center; justify-content: center; z-index: 10000; }
    .lightbox-content { display: flex; width: 95vw; height: 90vh; background: #111; border-radius: 15px; overflow: hidden; position: relative; }
    .lightbox-image-side { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
    .lightbox-image-side img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lightbox-info-side { flex: 0 0 400px; padding: 40px 30px; background: #1a1a1a; color: white; overflow-y: auto; border-left: 1px solid rgba(255,255,255,0.1); }

    /* --- 7. UI Components --- */
    .btn-close {
        position: absolute !important; top: 15px !important; right: 15px !important;
        z-index: 1065 !important; background-color: #000 !important; 
        border: 2px solid #ffffff !important; border-radius: 50% !important; 
        width: 40px !important; height: 40px !important; display: flex !important;
        align-items: center; justify-content: center; opacity: 1 !important;
    }
    .btn-close::before, .btn-close::after { content: ''; position: absolute; width: 2px; height: 20px; background-color: #ffffff !important; }
    .btn-close::before { transform: rotate(45deg); }
    .btn-close::after { transform: rotate(-45deg); }

    /* --- 8. 修正版：八毅質感紅詢問頁籤 --- */
    .floating-line-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
        
        /* 配色與質感 */
        background: linear-gradient(135deg, var(--brand-red) 0%, #4a1e24 100%);
        color: white !important;
        padding: 12px 22px;
        border-radius: 8px;
        text-decoration: none !important;
        display: flex;
        align-items: center;
        font-weight: bold;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);

        /* 關鍵：預設隱藏，並設定淡入動畫 */
        opacity: 0;
        visibility: hidden;
        transition: all 0.5s ease-in-out; /* 基礎過渡 */
    }
    /* 關鍵：當 Loading 結束 (body 移除 is-loading) 時，按鈕淡入 */
    body:not(.is-loading) .floating-line-btn {
        opacity: 1;
        visibility: visible;
        /* 加個微微的上浮動畫，更有進場感 */
        animation: fadeInUpBtn 0.8s 2s ease forwards; /* 延遲 2 秒，確保在 Loading 後出現 */
    }
    /* 按鈕進場動畫定義 */
    @keyframes fadeInUpBtn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .floating-line-btn i { font-size: 22px; margin-right: 10px; color: #fff; }
    .floating-line-btn::before {
        content: ''; width: 8px; height: 8px; background: #00ff00; border-radius: 50%;
        margin-right: 10px; box-shadow: 0 0 10px #00ff00;
        animation: pulse-green 2s infinite;
    }

    /* 懸浮效果保持不變 */
    .floating-line-btn:hover {
        transform: scale(1.05) translateY(-5px) !important; /* 加上 !important 確保覆蓋進場動畫 */
        box-shadow: 0 15px 30px rgba(114, 47, 55, 0.4);
        background: linear-gradient(135deg, #8b3a44 0%, var(--brand-red) 100%);
    }
    /* 禁止手機系統自動調整文字大小 */
html {
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    -ms-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* 確保 Flex 容器不會被文字撐破 */
.flex-container, .navbar, .carousel-caption-custom {
    max-width: 100vw;
    overflow: hidden;
}
    /* --- 9. RWD 修正 --- */
    @media (max-width: 992px) {
        .lightbox-content { flex-direction: column; height: 95vh; }
        .lightbox-image-side { flex: 0 0 45%; }
        .lightbox-info-side { flex: 1; width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); }
    }

    @media (max-width: 768px) {
        .carousel-caption-custom h1 { font-size: 2rem !important; }
        .lightbox-content { height: 90vh !important; margin: 5vh auto !important; }
        .lightbox-info-side { overflow-y: auto !important; }
        .lightbox-info-side .btn-outline-light { margin-bottom: 40px !important; }
        
        /* 手機版按鈕微調 */
        .floating-line-btn { bottom: 20px; right: 20px; padding: 10px 18px; font-size: 14px; }
        body.modal-open .floating-line-btn { display: none; } /* 彈窗開啟時隱藏 */
    }

    /* --- 10. 動畫定義 --- */
    @keyframes pulse-green {
        0% { transform: scale(0.9); opacity: 0.7; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(0.9); opacity: 0.7; }
    }
    @keyframes masterEntrance { 0% { opacity: 0; transform: scale(5); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes tentBounce { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

    let currentTabId = '';

// 確保 HTML 呼叫時是用這個函數
function openProductModal(catKey) {
        const data = productLibrary[catKey];
        if (!data) return;

        const modalTitle = document.getElementById('prod-modal-title');
        const listEl = document.getElementById('prod-list');
        const prodImg = document.getElementById('prod-img');
        const prodName = document.getElementById('prod-name');
        const prodSpecs = document.getElementById('prod-specs');

        modalTitle.innerText = data.title;
        currentTabId = data.tab;
        listEl.innerHTML = '';

        data.items.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'list-group-item list-group-item-action';
            btn.innerText = item.name;
            btn.onclick = () => {
                prodImg.src = item.img;
                prodName.innerText = item.name;
                prodSpecs.innerHTML = item.specs;
                document.querySelectorAll('#prod-list .list-group-item').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
            };
            listEl.appendChild(btn);
            if(index === 0) btn.click();
        });

        new bootstrap.Modal(document.getElementById('productModal')).show();
    }

    function closeProductAndOpenAlbum() {
        const modal = bootstrap.Modal.getInstance(document.getElementById('productModal'));
        if (modal) modal.hide();
        setTimeout(() => {
            const albumModalEl = document.getElementById('albumModal');
            const albumModal = new bootstrap.Modal(albumModalEl);
            albumModal.show();
            const tabTrigger = document.getElementById(currentTabId);
            if (tabTrigger) {
                new bootstrap.Tab(tabTrigger).show();
            }
        }, 400);
    }

// --- 卡片相簿連動系統 (保持原樣) ---
function openAlbumTab(tabId) {
    const albumModalEl = document.getElementById('albumModal');
    let albumModal = bootstrap.Modal.getInstance(albumModalEl);
    if (!albumModal) {
        albumModal = new bootstrap.Modal(albumModalEl);
    }
    albumModal.show();
    albumModalEl.addEventListener('shown.bs.modal', function () {
        const tabEl = document.getElementById(tabId);
        if (tabEl) {
            const tab = new bootstrap.Tab(tabEl);
            tab.show();
        }
    }, { once: true }); 
}

// --- 相簿與燈箱功能 (保持原樣) ---
function loadGallery(containerId, list) {
    const rowContainer = document.querySelector(`#${containerId} .row`);
    if (!rowContainer) return;
    rowContainer.innerHTML = list.map(id => {
        const item = photoLibrary[id];
        if(!item) return ''; // 防呆
        return `
            <div class="col-md-4 col-lg-3 mb-4" onclick="openProjectGallery('${id}')" style="cursor:pointer;">
                <div class="album-card">
                    <div class="album-img-wrapper">
                        <span class="photo-tag">${item.tag}</span>
                        <img src="${item.images[0]}" class="album-img" loading="lazy">
                    </div>
                </div>
            </div>`;
    }).join('');
}

function openProjectGallery(projectId) {
    currentProject = photoLibrary[projectId];
    if (!currentProject) return;
    currentImgIdx = 0;
    updateLightbox();
}

// 【重點修正】僅調整燈箱結構以支援箭頭靠邊與滑動
function updateLightbox() {
    const lb = document.getElementById('imgLightbox');
    if(!lb || !currentProject) return;
    const info = currentProject;
    const formattedDesc = info.desc.replace(/\n/g, '<br>');
    
    // 將箭頭直接放入 lightbox-image-side，並設定透明放大樣式
    lb.innerHTML = `
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <div class="lightbox-image-side" id="lightbox-touch-area" style="position:relative; user-select:none;">
                <img src="${info.images[currentImgIdx]}" id="target-img" style="pointer-events:none;">
                
                ${info.images.length > 1 ? `
                    <button class="nav-btn prev" onclick="changeImage(-1)" style="position:absolute; left:10px; background:transparent; border:none; color:rgba(255,255,255,0.5); font-size:3rem; cursor:pointer; z-index:10;">❮</button>
                    <button class="nav-btn next" onclick="changeImage(1)" style="position:absolute; right:10px; background:transparent; border:none; color:rgba(255,255,255,0.5); font-size:3rem; cursor:pointer; z-index:10;">❯</button>
                    <div class="img-counter" style="position:absolute; bottom:10px; color:white; background:rgba(0,0,0,0.5); padding:2px 10px; border-radius:10px;"><span class="current">${currentImgIdx + 1}</span> / <span class="total">${info.images.length}</span></div>
                ` : ''}
            </div>

            <div class="lightbox-info-side">
                <h2 style="color: #BA2D30;">${info.title}</h2>
                <p><i class="bi bi-geo-alt-fill me-1"></i>${info.loc}</p>
                <hr>
                <div class="info-body"><p>${formattedDesc}</p></div>
                <button class="btn btn-outline-light w-100 mt-4" onclick="closeLightbox()">關閉</button>
            </div>
        </div>`;
        
    lb.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    // 綁定手勢與滑鼠事件
    const touchArea = document.getElementById('lightbox-touch-area');
    
    // 手機觸控
    touchArea.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
    touchArea.addEventListener('touchend', e => { handleSwipe(e.changedTouches[0].clientX); }, {passive: true});
    
    // 滑鼠拖動
    touchArea.addEventListener('mousedown', e => { startX = e.clientX; isDragging = true; });
    touchArea.addEventListener('mouseup', e => { if(isDragging) { handleSwipe(e.clientX); isDragging = false; } });
}

// 滑動邏輯判斷
function handleSwipe(endX) {
    const diff = startX - endX;
    if (Math.abs(diff) > 50) { // 滑動超過 50px 才觸發
        if (diff > 0) changeImage(1);  // 向左滑 -> 下一張
        else changeImage(-1);          // 向右滑 -> 上一張
    }
}

function changeImage(step) {
    if(!currentProject) return;
    currentImgIdx = (currentImgIdx + step + currentProject.images.length) % currentProject.images.length;
    document.getElementById('target-img').src = currentProject.images[currentImgIdx];
    const counter = document.querySelector('.img-counter .current');
    if(counter) counter.innerText = currentImgIdx + 1;
}

function closeLightbox() {  
    document.getElementById('imgLightbox').style.display = 'none';  
    document.body.style.overflow = 'auto';  
}

window.addEventListener('load', function() {
    const subPages = ['about-section', 'cooperation-section']; 
    subPages.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none'; 
    });

    const mainSections = ['heroCarousel', 'main-content']; 
    mainSections.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'block';
    });

    try {
        loadGallery('gallery-1', photos_Tables);
        loadGallery('gallery-2', photos_Truss);
        loadGallery('gallery-3', photos_Tent);
        loadGallery('gallery-4', photos_Stage);
        loadGallery('gallery-5', photos_Decor);
        console.log("✅ 相簿載入完成");
    } catch (e) {
        console.warn("⚠️ 相簿加載異常:", e);
    }

    const loader = document.getElementById('loading-screen');
    if (loader) {
        new Audio('低沉穩重的進場音.mp3').play().catch(e => {});
        setTimeout(() => {
            new Audio('俏皮彈出音.mp3').play().catch(e => {});
        }, 1200);

        setTimeout(() => {
            loader.style.opacity = '0'; 
            setTimeout(() => {
                loader.style.display = 'none'; 
                loader.style.zIndex = '-1';
                document.body.classList.remove('is-loading');
                document.body.style.overflow = 'auto'; 
                window.scrollTo(0, 0);
            }, 850); 
        }, 2500); 
    }
});

if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
}
