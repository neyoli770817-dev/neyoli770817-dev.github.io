   <style>
        /* --- 變數與基礎設定 --- */
        :root { 
            --brand-red: #722F37; 
            --bg-light: #f5f3ef;
            --text-dark: #333;
        }

        body, html { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; 
            width: 100%;
        }
        body.is-loading { overflow: hidden !important; }

        .object-fit-cover { object-fit: cover; }
        .mb-5 { margin-bottom: 3.5rem !important; }

        /* --- Navbar --- */
        .navbar { 
            background-color: var(--brand-red) !important; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .navbar-brand { 
            font-weight: 900; 
            color: white !important; 
            font-size: 1.5rem; 
            letter-spacing: 1px; 
        }
        .nav-link { 
            color: rgba(255,255,255,0.9) !important; 
            font-weight: 500; 
        }

        /* --- Loading Screen --- */
        #loading-screen {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100vh;
            background: #ffffff; 
            z-index: 9999; 
            display: flex;
            justify-content: center; 
            align-items: center;
            transition: opacity 0.8s ease-out;
        }
        .logo-box {
            width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo-box svg {
            width: 220px !important;
            height: auto !important;
            max-width: 100%;
            display: block;
            margin: 0 auto;
        }
        .brand-name-loading { 
            font-size: 24px; 
            font-weight: 900; 
            color: #000; 
            margin-top: 15px;
            letter-spacing: 4px; 
            opacity: 0; 
            animation: fadeIn 1s 0.6s forwards;
            padding-left: 0; 
            text-align: center;
            width: 100%;
        }

        /* --- Animations --- */
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        @keyframes pulse-red { 
            0% { opacity: 1; transform: scale(0.95); } 
            50% { opacity: 0.6; } 
            100% { opacity: 1; transform: scale(0.95); } 
        }
        .animate-pulse { animation: pulse-red 2s infinite; }

        /* --- Hero Carousel --- */
        #heroCarousel {
            height: 60vh;
            min-height: 400px;
            background-color: #000;
            position: relative;
            overflow: hidden;
        }
        .carousel-inner, .carousel-item { height: 100%; }
        .hero-carousel-item { height: 60vh; min-height: 450px; }
        .hero-bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            opacity: 0.7; z-index: 1;
        }
        .hero-subtitle {
            font-size: 1.5rem !important;      
            font-weight: 700;                  
            color: #ffffff !important;         
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8); 
            margin-top: 15px;
        }
        .carousel-caption { z-index: 10; bottom: 25%; }
        .carousel-caption-custom {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 80%;
        }

        /* --- Section Titles & Layouts --- */
        .main-wrapper {
            width: 100% !important;
            max-width: 100vw;
            margin: 0 auto !important;
            padding-left: 15px; 
            padding-right: 15px;
            box-sizing: border-box; 
        }
        .section-title { 
            color: var(--brand-red); font-weight: 900; 
            margin: 60px 0 40px; text-align: center; letter-spacing: 2px; 
        }
        .section-title::after { 
            content: ''; display: block; width: 50px; height: 3px; 
            background: var(--brand-red); margin: 15px auto; 
        }
        .my-main-container {
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- Cards & Components --- */
        .service-card {
            background: white; border-radius: 12px; overflow: hidden; height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.3s ease;
            border-bottom: 5px solid transparent; cursor: pointer; text-decoration: none; 
            color: inherit; display: block; border: none !important;
        }
        .service-card:hover { 
            transform: translateY(-8px); 
            border-bottom: 5px solid var(--brand-red); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); 
        }
        .service-card img { 
            width: 100%; height: 220px; object-fit: cover; 
            padding: 0 !important; 
            border: none !important; 
            background-color: transparent !important; 
        }
        .service-card-body { padding: 25px; text-align: center; flex-grow: 1; }
        .service-card-body h5 { color: var(--brand-red); font-weight: bold; margin-bottom: 12px; font-size: 1.2rem; }
        .service-card-body p { font-size: 0.95rem; color: #666; line-height: 1.6; margin: 0; }

        .stack-container { display: flex; flex-direction: column; width: 100%; }
        .stack-card-item { 
            margin-bottom: -15px; 
            transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative; z-index: 1;
        }
        .stack-card-item:hover { transform: translateY(-25px); z-index: 10; }
        .custom-stack-card {
            display: flex; background: white; border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); overflow: hidden;
            height: 120px; border: 1px solid #eee;
        }
        .stack-card-item:hover .custom-stack-card {
            border: 2px solid var(--brand-red);
            box-shadow: 0 15px 30px rgba(139, 0, 0, 0.15);
            background: #fffcfc;
        }

        .img-wrapper { width: 150px; flex-shrink: 0; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 15px 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-info h5 { margin: 0; font-weight: bold; color: #333; font-size: 1.15rem; }
        .card-info p { margin: 8px 0 0; font-size: 0.85rem; color: #666; line-height: 1.4; }

        .glow-card-final {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0,0,0,0.05) !important;
        }
        .glow-card-final:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 25px rgba(186, 45, 48, 0.7) !important; 
            border-color: rgba(186, 45, 48, 0.5) !important;
        }

        /* --- Gallery & Album --- */
        .gallery-container {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important;
            gap: 20px !important;
            padding: 20px !important;
            width: 100% !important;
        }
        .album-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 10px 25px rgba(114, 47, 55, 0.4) !important; 
            border-color: var(--brand-red) !important;
        }
        .gallery-item {
            width: calc(50% - 15px); 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .gallery-item img {
            width: 100%;    
            height: 200px;  
            object-fit: cover; 
            display: block;
        }
        .album-section { padding: 20px 0; }
        .album-card {
            background: white; border: 1px solid #e0e0e0; transition: all 0.3s ease;
            height: 100%; cursor: pointer;
        }
        .album-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.1); transform: translateY(-5px); }
        .album-img-wrapper {
            position: relative; width: 100%; aspect-ratio: 3 / 2;
            overflow: hidden; border-radius: 12px; transition: all 0.3s ease;
        }
        .album-img { width: 100%; height: 180px; object-fit: cover; transition: transform 0.5s ease; }
        .album-img-wrapper:hover .album-img { transform: scale(1.08); }
        .photo-tag {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.65); color: #fff;
            padding: 3px 10px; font-size: 12px; font-weight: 500;
            border-radius: 6px; z-index: 5; backdrop-filter: blur(4px);
        }

        /* --- Lightbox (更正後) --- */
        #imgLightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: none;
            align-items: center; justify-content: center; z-index: 10000;
        }
        .lightbox-content {
            display: flex; 
            width: 95vw; 
            height: 90vh; /* 固定高度是滾動關鍵 */
            background: #111; 
            border-radius: 15px; 
            overflow: hidden;
            position: relative;
        }
        .lightbox-image-side { flex: 1; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .lightbox-image-side img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .lightbox-info-side { 
            flex: 0 0 450px; 
            height: 100%; 
            padding: 50px 35px; 
            background: #1a1a1a; 
            color: white; 
            overflow-y: auto; /* 開啟滾動 */
            border-left: 1px solid rgba(255,255,255,0.1); 
        }
        
        /* 優化右側捲軸樣式 */
        .lightbox-info-side::-webkit-scrollbar { width: 6px; }
        .lightbox-info-side::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .lightbox-info-side::-webkit-scrollbar-thumb:hover { background: var(--brand-red); }

        .lightbox-info-side h2 { font-size: 1.8rem !important; font-weight: 700; color: #ff4d4d; margin-bottom: 15px; }
        .info-body p { font-size: 1.35rem !important; line-height: 1.85 !important; color: #f0f0f0; white-space: pre-wrap; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255, 255, 255, 0.1); color: white; border: none; width: 60px; height: 60px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); z-index: 10; }
        .nav-btn:hover { background: rgba(220, 53, 69, 0.8); }
        .nav-btn.prev { left: 20px; }
        .nav-btn.next { right: 20px; }
        .img-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); color: white; padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); }

        /* --- Viewer --- */
        #main-viewer {
            width: 100%;
            height: 400px; 
            background-color: transparent;
            display: block;
        }

        /* --- Media Queries --- */
        @media (max-width: 991px) {
            .container-fluid, .main-wrapper { 
                padding-left: 6% !important; padding-right: 6% !important; 
            }
            .d-grid {
                grid-template-columns: 1fr !important;
                gap: 40px !important;
            }
        }
        @media (min-width: 992px) {
            .d-grid {
                display: grid !important;
                grid-template-columns: 8fr 4fr !important;
                gap: 40px !important;
                align-items: start !important;
            }
        }
        @media (min-width: 768px) {
            .gallery-item {
                width: calc(25% - 15px);
            }
        }
        @media (max-width: 768px) {
            .lightbox-content { flex-direction: column !important; width: 100vw !important; height: 100vh !important; border-radius: 0 !important; overflow-y: auto !important; }
            .lightbox-image-side { height: 50vh !important; width: 100% !important; }
            .lightbox-info-side { flex: 1 !important; width: 100% !important; padding: 30px 20px !important; border-left: none !important; }
            .close-btn { 
                position: fixed !important; 
                top: 15px !important; 
                right: 15px !important; 
                z-index: 99999 !important; 
                background: rgba(0, 0, 0, 0.6) !important;
                color: #ffffff !important; 
                font-size: 30px !important; 
                width: 40px !important; 
                height: 40px !important; 
                display: flex !important; 
                align-items: center; 
                justify-content: center; 
                border-radius: 50%; 
            }
        }

        .card { 
            background-color: #F5F5DC !important; 
            border: none !important; 
            box-shadow: none !important; 
        }
    </style>
</head>

    let currentTabId = '';

// 確保 HTML 呼叫時是用這個函數
function openProductModal(catKey) {
        const data = productLibrary[catKey];
        if (!data) return;

        const modalTitle = document.getElementById('prod-modal-title');
        const listEl = document.getElementById('prod-list');
        const prodImg = document.getElementById('prod-img');
        const prodName = document.getElementById('prod-name');
        const prodSpecs = document.getElementById('prod-specs');

        modalTitle.innerText = data.title;
        currentTabId = data.tab;
        listEl.innerHTML = '';

        data.items.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'list-group-item list-group-item-action';
            btn.innerText = item.name;
            btn.onclick = () => {
                prodImg.src = item.img;
                prodName.innerText = item.name;
                prodSpecs.innerHTML = item.specs;
                document.querySelectorAll('#prod-list .list-group-item').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
            };
            listEl.appendChild(btn);
            if(index === 0) btn.click();
        });

        new bootstrap.Modal(document.getElementById('productModal')).show();
    }

    function closeProductAndOpenAlbum() {
        const modal = bootstrap.Modal.getInstance(document.getElementById('productModal'));
        if (modal) modal.hide();
        setTimeout(() => {
            const albumModalEl = document.getElementById('albumModal');
            const albumModal = new bootstrap.Modal(albumModalEl);
            albumModal.show();
            const tabTrigger = document.getElementById(currentTabId);
            if (tabTrigger) {
                new bootstrap.Tab(tabTrigger).show();
            }
        }, 400);
    }

// --- 卡片相簿連動系統 ---
function openAlbumTab(tabId) {
    const albumModalEl = document.getElementById('albumModal');
    let albumModal = bootstrap.Modal.getInstance(albumModalEl);
    if (!albumModal) {
        albumModal = new bootstrap.Modal(albumModalEl);
    }
    albumModal.show();

    // 監聽 Modal 開啟完成後，再切換 Tab
    albumModalEl.addEventListener('shown.bs.modal', function () {
        const tabEl = document.getElementById(tabId);
        if (tabEl) {
            const tab = new bootstrap.Tab(tabEl);
            tab.show();
        }
    }, { once: true }); 
}
// (注意：就是這麼短，不要再留舊的 setTimeout 在下面了)
// --- 相簿與燈箱功能 ---
    

function loadGallery(containerId, list) {
    // 找到該 tab 下面的 .row
    const rowContainer = document.querySelector(`#${containerId} .row`);
    
    if (!rowContainer) return;

    // 只更新 row 裡面的 HTML，保留 row 的排版能力
    rowContainer.innerHTML = list.map(id => {
        const item = photoLibrary[id];
        return `
            <div class="col-md-4 col-lg-3 mb-4" onclick="openProjectGallery('${id}')" style="cursor:pointer;">
                <div class="album-card">
                    <div class="album-img-wrapper">
                        <span class="photo-tag">${item.tag}</span>
                        <img src="${item.images[0]}" class="album-img" loading="lazy">
                    </div>
                </div>
            </div>`;
    }).join('');
}

function openProjectGallery(projectId) {
        currentProject = photoLibrary[projectId];
        if (!currentProject) return;
        currentImgIdx = 0;
        updateLightbox();
    }

    function updateLightbox() {
    const lb = document.getElementById('imgLightbox');
    if(!lb || !currentProject) return; // 加入防呆
    const info = currentProject;
    const formattedDesc = info.desc.replace(/\n/g, '<br>');
    lb.innerHTML = `
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <div class="lightbox-image-side">
                <img src="${info.images[currentImgIdx]}" id="target-img">
                ${info.images.length > 1 ? `
                    <div class="nav-controls">
                        <button class="nav-btn prev" onclick="changeImage(-1)">❮</button>
                        <button class="nav-btn next" onclick="changeImage(1)">❯</button>
                    </div>
                    <div class="img-counter"><span class="current">${currentImgIdx + 1}</span> / <span class="total">${info.images.length}</span></div>
                ` : ''}
            </div>

            <div class="lightbox-info-side">
                <h2 style="color: #BA2D30;">${info.title}</h2>
                <p><i class="bi bi-geo-alt-fill me-1"></i>${info.loc}</p>
                <hr>
                <div class="info-body"><p>${formattedDesc}</p></div>
                <button class="btn btn-outline-light w-100 mt-4" onclick="closeLightbox()">關閉</button>
            </div>
        </div>`;
    lb.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

    function changeImage(step) {
        currentImgIdx = (currentImgIdx + step + currentProject.images.length) % currentProject.images.length;
        document.getElementById('target-img').src = currentProject.images[currentImgIdx];
        const counter = document.querySelector('.img-counter .current');
        if(counter) counter.innerText = currentImgIdx + 1;
    }

    function closeLightbox() {  
        document.getElementById('imgLightbox').style.display = 'none';  
        document.body.style.overflow = 'auto';  
    }

// --- 頁面初始化 ---
window.addEventListener('load', function() {
    try {
        loadGallery('gallery-1', photos_Tables);
        loadGallery('gallery-2', photos_Truss);
        loadGallery('gallery-3', photos_Tent);
        loadGallery('gallery-4', photos_Stage);
        loadGallery('gallery-5', photos_Decor);
        console.log("✅ 相簿載入完成");
    } catch (e) {
        console.warn("⚠️ 相簿加載異常:", e);
    }

    const loader = document.getElementById('loading-screen');
    if (loader) {
        setTimeout(() => {
            loader.style.opacity = '0'; 
            setTimeout(() => {
                loader.style.display = 'none'; 
                loader.style.zIndex = '-1';
                document.body.classList.remove('is-loading');
                document.body.style.overflow = 'auto'; 
            }, 850); 
        }, 2500); 
    }
});
